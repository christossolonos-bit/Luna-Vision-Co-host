ollama:
  host: http://127.0.0.1:11434
  model: your-chat-model
  vision_model: qwen3.5:4b
  think: false
  chat_think: false
  temperature: 0.85
  max_tokens: 180
  num_ctx: 4096

screen:
  monitor: 1
  max_width: 960
  jpeg_quality: 68
  capture_interval_sec: 8
  video_max_segments: 5
  video_bytes_per_second: 1000000
  video_fps: 4
  video_segment_seconds: 1.0
  capture_enabled: false

cohost:
  name: Luna
  player_name: your_gamertag
  # Optional fallback if your name is not readable in a frame
  player_champion: ""
  style: energetic
  max_history: 8

league:
  enabled: true
  live_port: 2999
  timeout_sec: 1.5
  lockfile_paths: []

vrm:
  model_path: "C:\\path\\to\\your\\model.vrm"
  idle_animation_path: "C:\\path\\to\\your\\idle.vrma"

voice:
  provider: edge
  reference_audio: "C:\\path\\to\\your\\reference_voice.wav"
  language: en
  model_name: tts_models/multilingual/multi-dataset/xtts_v2
  gpu: true
  default_mood: neutral
  auto_mood: true
  speed: 1.0  # XTTS only — 1.3 = 30% faster (mood presets stack on top)
  use_delivery_tags: true  # [whispers] [seductive] [pause] etc. — see voice_tags.py
  # ElevenLabs (provider: elevenlabs) — native tag support with eleven_v3
  elevenlabs_api_key: ""
  elevenlabs_voice_id: ""
  elevenlabs_model: eleven_v3
  elevenlabs_output_format: mp3_44100_128
  edge_voice: en-US-AvaMultilingualNeural
  rate: "+0%"
  pitch: "+0Hz"

speech:
  model: base
  device: cpu
  compute_type: int8

ui:
  host: 127.0.0.1
  port: 7860
  share: false

twitch:
  enabled: false
  username: your_bot_username
  oauth_token: oauth:your_token_from_twitchapps_com_tmi
  channel: your_channel_name
  client_id: ""
  client_secret: ""
  creator_name: ""
  owner_login: ""
  creator_aliases: ""
  system_prompt: ""
  persona: ""
  voice_rules: ""
  send_replies: true
  auto_reply: true
  auto_trigger: all
  auto_cooldown_sec: 6
  speak_replies: true
  command_prefix: "!luna"
  use_screen: true
  idle_talk: true
  idle_talk_quiet_sec: 45
  idle_talk_cooldown_sec: 90
  idle_talk_use_screen: true
  idle_talk_send_chat: false
